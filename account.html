<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Your Lay's Premium account - order history, profile, and more.">
    <title>My Account | Lay's Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="brand-text">LAY'S</span>
                <span class="premium-badge">PREMIUM</span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="index.html">Home</a>
                <a href="shop.html">Shop</a>
                <a href="index.html#story">Our Story</a>
                <a href="index.html#contact">Contact</a>
            </div>
            <div class="nav-actions">
                <button class="cart-btn" id="cart-btn" aria-label="Open Cart">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                    <span class="cart-count" id="cartCount">0</span>
                </button>
                <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Toggle Menu">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Auth Section (shown when not logged in) -->
    <section class="auth-page" id="authPage">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-logo">
                    <span class="brand-text" style="font-size:2.5rem;">LAY'S</span>
                    <span class="premium-badge">PREMIUM</span>
                </div>

                <!-- Tab Toggle -->
                <div class="auth-tabs">
                    <button class="auth-tab active" id="loginTab" onclick="switchTab('login')">Sign In</button>
                    <button class="auth-tab" id="registerTab" onclick="switchTab('register')">Create Account</button>
                </div>

                <!-- Login Form -->
                <form class="auth-form active" id="loginForm">
                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-gradient btn-lg w-100">Sign In</button>
                    <p class="auth-switch">No account? <button type="button" onclick="switchTab('register')" class="link-btn">Create one</button></p>
                </form>

                <!-- Register Form -->
                <form class="auth-form" id="registerForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="regFirst">First Name</label>
                            <input type="text" id="regFirst" placeholder="John" required>
                        </div>
                        <div class="form-group">
                            <label for="regLast">Last Name</label>
                            <input type="text" id="regLast" placeholder="Doe" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="regEmail">Email</label>
                        <input type="email" id="regEmail" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="regPassword">Password</label>
                        <input type="password" id="regPassword" placeholder="Min 6 characters" required>
                    </div>
                    <button type="submit" class="btn-gradient btn-lg w-100">Create Account</button>
                    <p class="auth-switch">Already have an account? <button type="button" onclick="switchTab('login')" class="link-btn">Sign in</button></p>
                </form>
            </div>
        </div>
    </section>

    <!-- Account Dashboard (shown when logged in) -->
    <section class="account-page" id="accountPage" style="display:none;">
        <div class="account-container">

            <!-- Sidebar -->
            <aside class="account-sidebar">
                <div class="account-avatar">
                    <div class="avatar-circle" id="avatarCircle">A</div>
                    <h3 id="accountName">User</h3>
                    <p id="accountEmail">user@example.com</p>
                </div>
                <nav class="account-nav">
                    <button class="account-nav-item active" onclick="showTab('orders')" id="navOrders">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                        Order History
                    </button>
                    <button class="account-nav-item" onclick="showTab('profile')" id="navProfile">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        Profile
                    </button>
                </nav>
                <button class="btn-outline logout-btn" id="logoutBtn">Sign Out</button>
            </aside>

            <!-- Main Content -->
            <main class="account-main">

                <!-- Orders Tab -->
                <div class="account-tab active" id="tabOrders">
                    <h2>Order <span class="text-gradient">History</span></h2>
                    <div id="orderHistoryList"></div>
                </div>

                <!-- Profile Tab -->
                <div class="account-tab" id="tabProfile">
                    <h2>Your <span class="text-gradient">Profile</span></h2>
                    <form class="checkout-form" id="profileForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label>First Name</label>
                                <input type="text" id="profileFirst">
                            </div>
                            <div class="form-group">
                                <label>Last Name</label>
                                <input type="text" id="profileLast">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="profileEmail" disabled>
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="tel" id="profilePhone" placeholder="+91 00000 00000">
                        </div>
                        <button type="submit" class="btn-gradient">Save Changes</button>
                    </form>
                </div>
            </main>
        </div>
    </section>

    <!-- Cart Sidebar -->
    <div class="cart-overlay" id="cartOverlay">
        <div class="cart-sidebar">
            <div class="cart-header">
                <h3>Your Bag <span class="cart-count-header" id="cartCountHeader">(0)</span></h3>
                <button class="close-cart" id="closeCart">&times;</button>
            </div>
            <div class="cart-items" id="cartItems">
                <div class="empty-cart-msg" id="emptyCartMsg">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                    <p>Your bag is empty</p>
                </div>
            </div>
            <div class="cart-footer" id="cartFooter">
                <div class="cart-total">
                    <span>Subtotal</span>
                    <span id="cartTotalVal">₹0</span>
                </div>
                <button class="btn-gradient w-100 checkout-btn" id="checkoutBtn">Proceed to Checkout</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"><span id="toastMsg"></span></div>

    <script src="cart.js"></script>
    <script src="account.js"></script>
</body>
</html>
